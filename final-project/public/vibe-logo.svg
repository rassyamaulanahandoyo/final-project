<svg width="40" height="40" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="circleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff006e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8338ec;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a86ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e0e0e0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0c0c0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="90" fill="url(#circleGradient)" stroke="url(#circleGradient)" stroke-width="6"/>
  
  <!-- Sound waves -->
  <g transform="translate(100,100)">
    <!-- Wave bars -->
    <rect x="-35" y="-20" width="8" height="40" fill="url(#iconGradient)" rx="4"/>
    <rect x="-20" y="-30" width="8" height="60" fill="url(#iconGradient)" rx="4"/>
    <rect x="-5" y="-35" width="8" height="70" fill="url(#iconGradient)" rx="4"/>
    <rect x="10" y="-25" width="8" height="50" fill="url(#iconGradient)" rx="4"/>
    <rect x="25" y="-15" width="8" height="30" fill="url(#iconGradient)" rx="4"/>
    
    <!-- Hand/gesture icon -->
    <g transform="translate(0, 15)">
      <!-- Palm -->
      <ellipse cx="0" cy="0" rx="12" ry="18" fill="url(#iconGradient)" opacity="0.9"/>
      <!-- Thumb -->
      <ellipse cx="-8" cy="-5" rx="4" ry="10" fill="url(#iconGradient)" transform="rotate(-30)" opacity="0.9"/>
      <!-- Index finger -->
      <rect x="-2" y="-25" width="4" height="15" fill="url(#iconGradient)" rx="2" opacity="0.9"/>
      <!-- Middle finger -->
      <rect x="2" y="-28" width="4" height="18" fill="url(#iconGradient)" rx="2" opacity="0.9"/>
      <!-- Ring finger -->
      <rect x="6" y="-25" width="4" height="15" fill="url(#iconGradient)" rx="2" opacity="0.9"/>
      <!-- Pinky -->
      <rect x="10" y="-20" width="3" height="12" fill="url(#iconGradient)" rx="1.5" opacity="0.9"/>
    </g>
  </g>
</svg>